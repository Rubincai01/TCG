<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rubin's Hub - 导航中心</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --panel-2: #18233a;
      --text: #e8eefc;
      --muted: #95a3bf;
      --red: #ff5b6c;
      --green: #2ccf87;
      --yellow: #f6c85f;
      --blue: #2d6df6;
      --purple: #8b5cf6;
      --orange: #f59e0b;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #0e1730 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 36px 20px 60px; }

    /* hero */
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 { font-size: 36px; letter-spacing: -0.5px; margin-bottom: 8px; }
    .hero p { color: var(--muted); font-size: 15px; line-height: 1.6; }
    .hero .actions { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }

    /* buttons */
    button, .btn {
      border: 0; background: var(--blue); color: white;
      padding: 9px 18px; border-radius: 10px; cursor: pointer;
      font-size: 14px; box-shadow: var(--shadow); transition: all .15s;
      font-weight: 500;
    }
    button:hover { opacity: .85; transform: translateY(-1px); }
    .btn-green { background: var(--green); color: #0b1220; font-weight: 600; }
    .btn-danger { background: #c0392b; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-outline { background: transparent; border: 1px solid var(--line); color: var(--muted); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

    /* add panel */
    .add-panel {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; padding: 22px 24px; margin-bottom: 28px;
      box-shadow: var(--shadow); display: none;
    }
    .add-panel.open { display: block; animation: slideIn .2s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
    .add-panel h3 { margin: 0 0 16px; font-size: 17px; display: flex; align-items: center; gap: 8px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select {
      background: rgba(255,255,255,.06); border: 1px solid var(--line);
      color: var(--text); padding: 10px 13px; border-radius: 9px; font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
    .form-group input::placeholder { color: rgba(255,255,255,.25); }

    /* card grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; padding: 22px; box-shadow: var(--shadow);
      transition: all .2s ease; position: relative; overflow: hidden;
    }
    .card:hover { border-color: rgba(255,255,255,.15); transform: translateY(-3px); box-shadow: 0 24px 56px rgba(0,0,0,.32); }
    .card .icon { font-size: 28px; margin-bottom: 12px; display: block; }
    .card h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .card p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
    .card .tag {
      display: inline-block; padding: 3px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 600; margin-right: 6px; margin-bottom: 4px;
    }
    .tag-stock { background: rgba(44,207,135,.12); color: var(--green); border: 1px solid rgba(44,207,135,.2); }
    .tag-tcg { background: rgba(45,109,246,.12); color: var(--blue); border: 1px solid rgba(45,109,246,.2); }
    .tag-tool { background: rgba(139,92,246,.12); color: var(--purple); border: 1px solid rgba(139,92,246,.2); }
    .tag-other { background: rgba(245,158,11,.12); color: var(--orange); border: 1px solid rgba(245,158,11,.2); }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .card-actions button { font-size: 11px; padding: 5px 10px; border-radius: 7px; }
    .card .visit-btn { flex: 1; background: rgba(45,109,246,.15); color: var(--blue); border: 1px solid rgba(45,109,246,.25); }
    .card .visit-btn:hover { background: var(--blue); color: white; }

    /* overlay dialog */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(4px); }
    .overlay.show { display: flex; }
    .dialog {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 18px; padding: 28px; width: 420px; max-width: 90%;
      box-shadow: var(--shadow);
    }
    .dialog h3 { margin: 0 0 16px; font-size: 18px; }
    .dialog p { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    .dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* empty state */
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty .emoji { font-size: 48px; margin-bottom: 14px; }

    /* footer */
    .footer { text-align: center; margin-top: 48px; color: var(--muted); font-size: 12px; opacity: .6; }

    /* sync panel */
    .sync-panel {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px 18px; margin-top: 20px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; justify-content: center;
    }
    .sync-panel input {
      background: rgba(255,255,255,.06); border: 1px solid var(--line);
      color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px;
      outline: none; width: 300px; font-family: monospace; flex: 1; min-width: 200px;
    }
    .sync-panel input:focus { border-color: var(--blue); }
    .sync-status { font-size: 13px; font-weight: 600; white-space: nowrap; }
    .sync-ok { color: var(--green); }
    .sync-off { color: var(--yellow); }
    .sync-err { color: var(--red); }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 26px; }
      .sync-panel { flex-direction: column; align-items: stretch; }
      .sync-panel input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- hero -->
    <div class="hero">
      <h1>🚀 Rubin's Hub</h1>
      <p>个人工具导航中心 — 点击卡片访问，点击编辑管理链接</p>
      <div class="actions">
        <button class="btn-green btn-sm" onclick="toggleAdd()">＋ 添加页面</button>
        <button class="btn-sm btn-outline" onclick="exportData()">📤 导出</button>
        <button class="btn-sm btn-outline" onclick="importData()">📥 导入</button>
      </div>

      <!-- sync panel -->
      <div class="sync-panel">
        <span style="color:var(--muted);font-size:13px">☁️ 云端同步</span>
        <input id="tokenInput" type="password" placeholder="输入 GitHub Token 启用跨设备同步" />
        <button class="btn-sm" id="syncSaveBtn">保存并同步</button>
        <button class="btn-sm btn-outline" id="syncPullBtn">拉取云端</button>
        <span id="syncStatus" class="sync-status sync-off">未连接</span>
      </div>
    </div>

    <!-- add form -->
    <div class="add-panel" id="addPanel">
      <h3>📌 添加新页面</h3>
      <div class="form-row">
        <div class="form-group">
          <label>名称 *</label>
          <input id="fName" placeholder="例如：股票监控面板" />
        </div>
        <div class="form-group">
          <label>URL *</label>
          <input id="fUrl" placeholder="https://..." style="flex:2" />
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="fCat">
            <option value="stock">📈 投资/股票</option>
            <option value="tcg">🃏 TCG卡牌</option>
            <option value="tool">🔧 工具</option>
            <option value="other">📁 其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>图标 (emoji)</label>
          <input id="fIcon" placeholder="📊" maxlength="4" style="width:80px" />
        </div>
        <div class="form-group">
          <label>描述（选填）</label>
          <input id="fDesc" placeholder="一句话说明" />
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button onclick="addItem()" style="padding:10px 20px">✅ 添加</button>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn-sm btn-outline" onclick="toggleAdd()">取消</button>
        </div>
      </div>
      <div id="formMsg" style="margin-top:10px;font-size:13px"></div>
    </div>

    <!-- cards -->
    <div class="grid" id="cardGrid"></div>

    <!-- footer -->
    <div class="footer">Rubin's Hub · 支持导出/导入 ☁️ 输入GitHub Token启用云端同步（跨设备一致）</div>
  </div>

  <!-- delete confirm -->
  <div class="overlay" id="delOverlay">
    <div class="dialog">
      <h3>⚠️ 确认删除</h3>
      <p id="delText">确定删除这个页面吗？</p>
      <div class="dialog-actions">
        <button class="btn-sm btn-outline" onclick="closeDel()">取消</button>
        <button class="btn-danger btn-sm" onclick="confirmDel()">确认删除</button>
      </div>
    </div>
  </div>

  <!-- edit dialog -->
  <div class="overlay" id="editOverlay">
    <div class="dialog" style="width:450px">
      <h3>✏️ 编辑页面信息</h3>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label>名称</label><input id="eName" /></div>
        <div class="form-group"><label>URL</label><input id="eUrl" /></div>
        <div class="form-group"><label>分类</label><select id="eCat"><option value="stock">📈 投资/股票</option><option value="tcg">🃏 TCG卡牌</option><option value="tool">🔧 工具</option><option value="other">📁 其他</option></select></div>
        <div class="form-group"><label>图标</label><input id="eIcon" maxlength="4" /></div>
        <div class="form-group"><label>描述</label><input id="eDesc" /></div>
      </div>
      <div class="dialog-actions" style="margin-top:18px">
        <button class="btn-sm btn-outline" onclick="closeEdit()">取消</button>
        <button class="btn-sm" style="background:var(--blue)" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

<script>
// v=20260413 强制破缓存，更新后改此值
const BASE = 'https://rubincai01.github.io/TCG/';
const STORAGE_KEY = 'hub_links_v2';
let items = [];
let pendingDel = null;
let editingIdx = null;

// default data
const DEFAULT_ITEMS = [
  { name: '股票监控面板', url: BASE + 'Stocks/index.html', cat: 'stock', icon: '📊', desc: 'A股/港股实时行情，入场止盈止损提醒' },
  { name: 'TCG 大师图鉴', url: BASE + 'catalog/', cat: 'tcg', icon: '🃏', desc: 'PTCG x OPCG 全系列卡牌图鉴，39张简中独占' },
  { name: '卡牌监控页', url: BASE + 'monitor/', cat: 'tcg', icon: '🔍', desc: '集换社卡价监控，Server酱推送提醒' },
  { name: '卡片收藏家主页(旧版)', url: BASE + 'archive/index-old.html', cat: 'other', icon: '🏠', desc: '旧版卡片收藏家主页（归档备份）' }
];

function load() {
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    if (s) { items = JSON.parse(s); return; }
  } catch(e) {}
  // first time
  items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  save();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch(e) {}
}

// render
function render() {
  var grid = document.getElementById('cardGrid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div class="emoji">📭</div><p>还没有添加任何页面<br/>点击上方「+ 添加页面」开始</p></div>';
    return;
  }
  grid.innerHTML = items.map(function(it, i) {
    return '<div class="card">' +
      '<span class="icon">' + esc(it.icon || '📄') + '</span>' +
      '<h3>' + esc(it.name) + '</h3>' +
      '<p style="font-size:12px;color:#888;word-break:break-all;">' + esc(it.url || '') + '</p>' +
      '<p>' + esc(it.desc || '') + '</p>' +
      '<span class="tag tag-' + it.cat + '">' + catLabel(it.cat) + '</span>' +
      '<div class="card-actions">' +
        '<a class="btn visit-btn" href="' + esc(it.url) + '" target="_blank">🔗 打开</a>' +
        '<button class="btn-sm btn-outline" onclick="openEdit(' + i + ')">编辑</button>' +
        '<button class="btn-sm btn-danger" onclick="askDel(' + i + ')">删除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function catLabel(c) {
  var map = { stock:'投资/股票', tcg:'TCG卡牌', tool:'工具', other:'其他' };
  return map[c] || c;
}

function esc(s) { var d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

// add
function toggleAdd() {
  var p = document.getElementById('addPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) document.getElementById('fName').focus();
  document.getElementById('formMsg').textContent = '';
}

function addItem() {
  var name = document.getElementById('fName').value.trim();
  var url = document.getElementById('fUrl').value.trim();
  var msg = document.getElementById('formMsg');
  if (!name) { msg.textContent = '❌ 请输入名称'; msg.style.color='var(--red)'; return; }
  if (!url) { msg.textContent = '❌ 请输入URL'; msg.style.color='var(--red)'; return; }
  items.push({
    name: name,
    url: url,
    cat: document.getElementById('fCat').value,
    icon: document.getElementById('fIcon').value || '📄',
    desc: document.getElementById('fDesc').value.trim()
  });
  save(); render(); toggleAdd(); autoSync();
  ['fName','fUrl','fIcon','fDesc'].forEach(function(id){document.getElementById(id).value=''});
  document.getElementById('fCat').selectedIndex = 0;
}

// delete
function askDel(i) {
  pendingDel = i;
  document.getElementById('delText').textContent = '确定删除「' + items[i].name + '」吗？';
  document.getElementById('delOverlay').classList.add('show');
}
function closeDel() { document.getElementById('delOverlay').classList.remove('show'); }
function confirmDel() {
  if (pendingDel === null) return;
  items.splice(pendingDel, 1);
  save(); render();
  pendingDel = null;
  closeDel(); autoSync();
}

// edit
function openEdit(i) {
  editingIdx = i;
  var it = items[i];
  document.getElementById('eName').value = it.name;
  document.getElementById('eUrl').value = it.url;
  document.getElementById('eCat').value = it.cat;
  document.getElementById('eIcon').value = it.icon || '';
  document.getElementById('eDesc').value = it.desc || '';
  document.getElementById('editOverlay').classList.add('show');
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('show'); editingIdx = null; }
function saveEdit() {
  if (editingIdx === null) return;
  items[editingIdx] = {
    name: document.getElementById('eName').value.trim(),
    url: document.getElementById('eUrl').value.trim(),
    cat: document.getElementById('eCat').value,
    icon: document.getElementById('eIcon').value || '📄',
    desc: document.getElementById('eDesc').value.trim()
  };
  save(); render();
  closeEdit(); autoSync();
}

// export / import
function exportData() {
  var blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rubin-hub-links-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData() {
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = function() {
    var file = this.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function() {
      try {
        var data = JSON.parse(reader.result);
        if (Array.isArray(data)) { items = data; save(); render(); autoSync(); alert('导入成功！共 ' + data.length + ' 条记录'); }
        else alert('文件格式不正确');
      } catch(e) { alert('解析失败：' + e.message); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// =====================================================
// GitHub Gist 云端同步
// =====================================================
const GIST_FILENAME = 'hub_links.json';
const TOKEN_KEY = 'hub_github_token';
const GIST_ID_KEY = 'hub_gist_id';
let gistId = null;

function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ''; }
function setGistId(id) { localStorage.setItem(GIST_ID_KEY, id); gistId = id; }

function updateSyncStatus(text, cls) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = text;
  el.className = 'sync-status ' + cls;
}

async function createGist(token) {
  var res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ description: "Rubin's Hub Links", public: false,
      files: { [GIST_FILENAME]: { content: JSON.stringify(items, null, 2) } } })
  });
  if (!res.ok) throw new Error('创建Gist失败: ' + res.status);
  var data = await res.json();
  return data.id;
}

async function updateGist(token, gid) {
  var res = await fetch('https://api.github.com/gists/' + gid, {
    method: 'PATCH',
    headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(items, null, 2) } } })
  });
  if (!res.ok) throw new Error('更新Gist失败: ' + res.status);
}

async function readGist(token, gid) {
  var res = await fetch('https://api.github.com/gists/' + gid, {
    headers: { 'Authorization': 'token ' + token } });
  if (!res.ok) throw new Error('读取Gist失败: ' + res.status);
  var data = await res.json();
  if (data.files && data.files[GIST_FILENAME]) {
    return JSON.parse(data.files[GIST_FILENAME].content);
  }
  return null;
}

async function findExistingGist(token) {
  var res = await fetch('https://api.github.com/gists?per_page=30', {
    headers: { 'Authorization': 'token ' + token } });
  if (!res.ok) return null;
  var gists = await res.json();
  for (var i = 0; i < gists.length; i++) {
    if (gists[i].files && gists[i].files[GIST_FILENAME]) return gists[i].id;
  }
  return null;
}

async function pushToCloud() {
  var token = getToken(); if (!token) return;
  try {
    var gid = getGistId();
    if (gid) { await updateGist(token, gid); }
    else {
      var existing = await findExistingGist(token);
      if (existing) { setGistId(existing); await updateGist(token, existing); }
      else { var newId = await createGist(token); setGistId(newId); }
    }
    updateSyncStatus('✅ 已同步 ' + new Date().toLocaleTimeString(), 'sync-ok');
  } catch(e) { updateSyncStatus('❌ 同步失败: ' + e.message, 'sync-err'); }
}

async function pullFromCloud() {
  var token = getToken();
  if (!token) { updateSyncStatus('⚠️ 请先输入Token', 'sync-off'); return; }
  try {
    updateSyncStatus('⏳ 拉取中...', 'sync-off');
    var gid = getGistId();
    if (gid) {
      try {
        var data = await readGist(token, gid);
        if (data && Array.isArray(data) && data.length > 0) {
          items = data; save(); render();
          updateSyncStatus('✅ 已拉取 ' + data.length + ' 条链接', 'sync-ok');
          return;
        }
      } catch(e) { setGistId(''); gid = null; }
    }
    gid = await findExistingGist(token);
    if (gid) {
      setGistId(gid);
      var data = await readGist(token, gid);
      if (data && Array.isArray(data) && data.length > 0) {
        items = data; save(); render();
        updateSyncStatus('✅ 已拉取 ' + data.length + ' 条链接', 'sync-ok');
        return;
      }
    }
    updateSyncStatus('⚠️ 云端无数据，请先保存', 'sync-off');
  } catch(e) { updateSyncStatus('❌ 拉取失败: ' + e.message, 'sync-err'); }
}

function autoSync() {
  if (getToken()) setTimeout(pushToCloud, 1000);
}

// init sync UI
(function() {
  var savedToken = getToken();
  if (savedToken) document.getElementById('tokenInput').value = savedToken;
  gistId = getGistId();

  document.getElementById('syncSaveBtn').addEventListener('click', function() {
    var t = document.getElementById('tokenInput').value.trim();
    if (!t) { updateSyncStatus('⚠️ 请输入Token', 'sync-off'); return; }
    setToken(t); updateSyncStatus('⏳ 同步中...', 'sync-off'); pushToCloud();
  });

  document.getElementById('syncPullBtn').addEventListener('click', function() {
    var t = document.getElementById('tokenInput').value.trim();
    if (t) setToken(t);
    pullFromCloud();
  });

  // auto pull on load if has token
  if (savedToken) {
    updateSyncStatus('⏳ 检查云端...', 'sync-off');
    pullFromCloud().then(function() {}).catch(function(e){});
  }
})();

// init
load();
render();

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeDel(); closeEdit();
    var ap = document.getElementById('addPanel');
    if (ap.classList.contains('open')) ap.classList.remove('open');
  }
});
</script>
</body>
</html>
