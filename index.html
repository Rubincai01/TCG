<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片收藏家 - 球星卡 & 宝可梦卡价格追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* 搜索区域 */
        .search-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 25px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .search-btn {
            padding: 15px 40px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }
        
        .filters {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-group label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .filter-select {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
        }
        
        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-change {
            font-size: 14px;
            margin-top: 5px;
        }
        
        .stat-change.positive {
            color: #4ecdc4;
        }
        
        .stat-change.negative {
            color: #ff6b6b;
        }
        
        /* 图表区域 */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
        }
        
        /* 卡片展示 */
        .cards-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .card-item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .card-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
        }
        
        .card-info {
            padding: 20px;
        }
        
        .card-category {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .card-category.pokemon {
            background: rgba(255,107,107,0.3);
            color: #ff6b6b;
        }
        
        .card-category.sports {
            background: rgba(78,205,196,0.3);
            color: #4ecdc4;
        }
        
        .card-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .card-series {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
        }
        
        .card-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .current-price {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .price-trend {
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 8px;
        }
        
        .price-trend.up {
            background: rgba(78,205,196,0.2);
            color: #4ecdc4;
        }
        
        .price-trend.down {
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
        }
        
        .buy-links {
            display: flex;
            gap: 10px;
        }
        
        .buy-link {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .buy-link.ebay {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .buy-link.ebay:hover {
            background: #e53238;
        }
        
        .buy-link.tcg {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .buy-link.tcg:hover {
            background: #1e88e5;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.6);
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .filters {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏆 卡片收藏家 Card Collector</h1>
    </header>
    
    <div class="container">
        <!-- 实时控制面板 -->
        <div class="control-panel" style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color: rgba(255,255,255,0.8); font-size: 14px;">⚡ 实时更新</span>
                    <label class="switch" style="position: relative; display: inline-block; width: 50px; height: 26px;">
                        <input type="checkbox" id="realtimeToggle" checked onchange="toggleRealtime()" style="opacity: 0; width: 0; height: 0;">
                        <span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #4ecdc4; border-radius: 26px; transition: 0.3s;"></span>
                    </label>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="color: rgba(255,255,255,0.6); font-size: 13px;">更新频率:</span>
                    <select id="updateFrequency" onchange="changeFrequency()" style="padding: 8px 15px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,255,255,0.2);">
                        <option value="1000">1秒</option>
                        <option value="3000">3秒</option>
                        <option value="5000" selected>5秒</option>
                        <option value="10000">10秒</option>
                        <option value="30000">30秒</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="color: rgba(255,255,255,0.6); font-size: 13px;">波动幅度:</span>
                    <select id="fluctuationRange" onchange="changeFluctuation()" style="padding: 8px 15px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,255,255,0.2);">
                        <option value="0.005">0.5%</option>
                        <option value="0.01">1%</option>
                        <option value="0.02" selected>2%</option>
                        <option value="0.05">5%</option>
                        <option value="0.1">10%</option>
                    </select>
                </div>
                <div id="lastUpdate" style="color: rgba(255,255,255,0.5); font-size: 12px;">
                    上次更新: 刚刚
                </div>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索卡片名称、球员、宝可梦...">
                <button class="search-btn" onclick="searchCards()">🔍 搜索</button>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label>卡片类型:</label>
                    <select class="filter-select" id="cardType">
                        <option value="all">全部</option>
                        <option value="pokemon">宝可梦</option>
                        <option value="sports">球星卡</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>排序:</label>
                    <select class="filter-select" id="sortBy">
                        <option value="price-desc">价格从高到低</option>
                        <option value="price-asc">价格从低到高</option>
                        <option value="trending">热度趋势</option>
                        <option value="newest">最新发布</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>价格区间:</label>
                    <select class="filter-select" id="priceRange">
                        <option value="all">全部</option>
                        <option value="0-50">$0 - $50</option>
                        <option value="50-200">$50 - $200</option>
                        <option value="200-1000">$200 - $1000</option>
                        <option value="1000+">$1000+</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📊 追踪卡片总数</div>
                <div class="stat-value" id="totalCards">12,458</div>
                <div class="stat-change positive">+156 今日新增</div>
            </div>

                <div class="stat-label">💰 平均价格</div>

            </div>
            <div class="stat-card">
                <div class="stat-label">🔥 热门涨幅</div>
                <div class="stat-value" id="hotTrend">+45%</div>

            </div>
            <div class="stat-card">
                <div class="stat-label">📈 市场指数</div>
                <div class="stat-value" id="marketIndex">1,245</div>

            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="charts-section">
            <div class="chart-container">
                <h3 class="chart-title">📈 价格趋势分析</h3>
                <canvas id="priceChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">🥧 卡片类型分布</h3>
                <canvas id="distributionChart"></canvas>
            </div>
        </div>
        
        <!-- 热门卡片 -->
        <div class="cards-section">
            <h2 class="section-title">🔥 热门卡片</h2>
            <div class="cards-grid" id="cardsGrid">
                <!-- 卡片将通过 JavaScript 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 实时数据更新脚本 -->
    <script>
        // WebSocket 或轮询配置
        const CONFIG = {
            updateInterval: 5000, // 每5秒更新一次
            enableRealtime: true,
            priceFluctuation: 0.02 // 价格波动范围 ±2%
        };

        // 实时数据管理器
        class RealtimeDataManager {
            constructor() {
                this.subscribers = [];
                this.updateTimer = null;
                this.startUpdates();
            }

            startUpdates() {
                if (CONFIG.enableRealtime) {
                    this.updateTimer = setInterval(() => {
                        this.simulatePriceChanges();
                        this.updateStats();
                    }, CONFIG.updateInterval);
                }
            }

            // 模拟价格变化
            simulatePriceChanges() {
                mockCards.forEach(card => {
                    const change = (Math.random() - 0.5) * 2 * CONFIG.priceFluctuation;
                    const oldPrice = card.currentPrice;
                    card.currentPrice = Math.round(card.currentPrice * (1 + change));
                    
                    // 计算涨跌幅
                    const percentChange = ((card.currentPrice - card.previousPrice) / card.previousPrice * 100).toFixed(1);
                    card.trend = percentChange >= 0 ? 'up' : 'down';
                    card.trendValue = (percentChange >= 0 ? '+' : '') + percentChange + '%';
                    
                    // 触发价格变动动画
                    if (Math.abs(change) > 0.005) {
                        this.highlightPriceChange(card.id, card.currentPrice > oldPrice ? 'up' : 'down');
                    }
                });
                
                // 重新渲染卡片
                renderCards(mockCards);
            }

            // 更新统计数据
            updateStats() {
                // 更新追踪卡片数
                const totalCards = document.getElementById('totalCards');
                const currentTotal = parseInt(totalCards.textContent.replace(/,/g, ''));
                const newTotal = currentTotal + Math.floor(Math.random() * 3);
                this.animateNumber(totalCards, currentTotal, newTotal);

                // 更新平均价格
                const avgPrice = document.getElementById('avgPrice');
                const currentAvg = parseInt(avgPrice.textContent.replace('$', '').replace(/,/g, ''));
                const newAvg = Math.round(currentAvg * (1 + (Math.random() - 0.5) * 0.01));
                this.animateNumber(avgPrice, currentAvg, newAvg, '$');

                // 更新市场指数
                const marketIndex = document.getElementById('marketIndex');
                const currentIndex = parseInt(marketIndex.textContent.replace(/,/g, ''));
                const newIndex = Math.round(currentIndex * (1 + (Math.random() - 0.5) * 0.005));
                this.animateNumber(marketIndex, currentIndex, newIndex);
                
                // 更新时间显示
                updateLastUpdateTime();
            }

            // 数字动画
            animateNumber(element, from, to, prefix = '') {
                const duration = 1000;
                const startTime = performance.now();
                
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 3);
                    const current = Math.round(from + (to - from) * easeProgress);
                    element.textContent = prefix + current.toLocaleString();
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };
                
                requestAnimationFrame(animate);
            }

            // 高亮价格变动
            highlightPriceChange(cardId, direction) {
                const card = document.querySelector(`[onclick="viewCardDetail(${cardId})"]`);
                if (card) {
                    const priceElement = card.querySelector('.current-price');
                    priceElement.style.transition = 'all 0.3s';
                    priceElement.style.color = direction === 'up' ? '#4ecdc4' : '#ff6b6b';
                    priceElement.style.transform = 'scale(1.1)';
                    
                    setTimeout(() => {
                        priceElement.style.color = '#ffd700';
                        priceElement.style.transform = 'scale(1)';
                    }, 1000);
                }
            }

            stop() {
                if (this.updateTimer) {
                    clearInterval(this.updateTimer);
                }
            }
        }

        // 模拟数据 - 实际使用时替换为 API 数据
        let mockCards = [
            {
                id: 1,
                name: "皮卡丘 VMAX",
                category: "pokemon",
                series: "剑与盾",
                image: "https://via.placeholder.com/300x200/ff6b6b/ffffff?text=Pikachu+VMAX",
                currentPrice: 1250,
                previousPrice: 860,
                currency: "$",
                trend: "up",
                trendValue: "+45%"
            },
            {
                id: 2,
                name: "勒布朗·詹姆斯 新秀卡",
                category: "sports",
                series: "Topps Chrome 2003",
                image: "https://via.placeholder.com/300x200/4ecdc4/ffffff?text=LeBron+James",
                currentPrice: 8500,
                previousPrice: 8200,
                currency: "$",
                trend: "up",
                trendValue: "+3.6%"
            },
            {
                id: 3,
                name: "喷火龙 GX",
                category: "pokemon",
                series: "太阳与月亮",
                image: "https://via.placeholder.com/300x200/ff6b6b/ffffff?text=Charizard+GX",
                currentPrice: 680,
                previousPrice: 720,
                currency: "$",
                trend: "down",
                trendValue: "-5.5%"
            },
            {
                id: 4,
                name: "迈克尔·乔丹 签名卡",
                category: "sports",
                series: "Upper Deck 1997",
                image: "https://via.placeholder.com/300x200/4ecdc4/ffffff?text=Michael+Jordan",
                currentPrice: 15000,
                previousPrice: 14500,
                currency: "$",
                trend: "up",
                trendValue: "+3.4%"
            },
            {
                id: 5,
                name: "超梦 V",
                category: "pokemon",
                series: "宝可梦 GO",
                image: "https://via.placeholder.com/300x200/9b59b6/ffffff?text=Mewtwo+V",
                currentPrice: 320,
                previousPrice: 280,
                currency: "$",
                trend: "up",
                trendValue: "+14%"
            },
            {
                id: 6,
                name: "斯蒂芬·库里 新秀卡",

        // 初始化图表
        function initCharts() {
            // 价格趋势图
            const priceCtx = document.getElementById('priceChart').getContext('2d');
            new Chart(priceCtx, {
                type: 'line',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                    datasets: [{
                        label: '宝可梦卡',
                        data: [1200, 1350, 1280, 1420, 1560, 1680],
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255,107,107,0.1)',
                        tension: 0.4
                    }, {
                        label: '球星卡',
                        data: [8500, 8200, 8800, 9100, 8950, 9200],
                        borderColor: '#4ecdc4',
                        backgroundColor: 'rgba(78,205,196,0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });

            // 分布饼图
            const distCtx = document.getElementById('distributionChart').getContext('2d');
            new Chart(distCtx, {
                type: 'doughnut',
                data: {
                    labels: ['宝可梦', 'NBA球星卡', '足球球星卡', '其他'],
                    datasets: [{
                        data: [45, 35, 12, 8],
                        backgroundColor: ['#ff6b6b', '#4ecdc4', '#ffd700', '#9b59b6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#fff', padding: 20 }
                        }
                    }
                }
            });
        }

        // 渲染卡片
        function renderCards(cards) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = cards.map(card => `
                <div class="card-item" onclick="viewCardDetail(${card.id})">
                    <img src="${card.image}" alt="${card.name}" class="card-image">
                    <div class="card-info">
                        <span class="card-category ${card.category}">
                            ${card.category === 'pokemon' ? '宝可梦' : '球星卡'}
                        </span>
                        <h3 class="card-name">${card.name}</h3>
                        <p class="card-series">${card.series}</p>
                        <div class="card-price">
                            <span class="current-price">${card.currency}${card.currentPrice.toLocaleString()}</span>
                            <span class="price-trend ${card.trend}">${card.trendValue}</span>
                        </div>
                        <div class="buy-links">
                            <a href="https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(card.name)}" 
                               target="_blank" class="buy-link ebay" onclick="event.stopPropagation()">
                                eBay
                            </a>
                            <a href="https://www.tcgplayer.com/search/all/product?q=${encodeURIComponent(card.name)}" 
                               target="_blank" class="buy-link tcg" onclick="event.stopPropagation()">
                                TCGPlayer
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 搜索功能
        function searchCards() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('cardType').value;
            
            let filtered = mockCards.filter(card => {
                const matchKeyword = card.name.toLowerCase().includes(keyword) || 
                                   card.series.toLowerCase().includes(keyword);
                const matchType = type === 'all' || card.category === type;
                return matchKeyword && matchType;
            });
            
            renderCards(filtered);
        }

        // 查看卡片详情
        function viewCardDetail(cardId) {
            const card = mockCards.find(c => c.id === cardId);
            alert(`卡片详情：\n\n名称：${card.name}\n系列：${card.series}\n当前价格：${card.currency}${card.currentPrice}\n趋势：${card.trendValue}\n\n（这里可以展开更详细的价格历史和分析）`);
        }

        // 切换实时更新
        function toggleRealtime() {
            const enabled = document.getElementById('realtimeToggle').checked;
            CONFIG.enableRealtime = enabled;
            
            if (enabled) {
                dataManager.startUpdates();
            } else {
                dataManager.stop();
            }
        }

        // 改变更新频率
        function changeFrequency() {
            const frequency = parseInt(document.getElementById('updateFrequency').value);
            CONFIG.updateInterval = frequency;
            
            // 重启更新定时器
            dataManager.stop();
            dataManager.startUpdates();
        }

        // 改变波动幅度
        function changeFluctuation() {
            const fluctuation = parseFloat(document.getElementById('fluctuationRange').value);
            CONFIG.priceFluctuation = fluctuation;
        }

        // 更新上次更新时间
        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            document.getElementById('lastUpdate').textContent = `上次更新: ${timeStr}`;
        }

        // 初始化
        let dataManager;
        
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            renderCards(mockCards);
            
            // 启动实时数据更新
            dataManager = new RealtimeDataManager();
            
            // 搜索框回车事件
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchCards();
            });
            
            // 添加实时状态指示器
            addRealtimeIndicator();
        });
        
        // 添加实时状态指示器
        function addRealtimeIndicator() {
            const header = document.querySelector('.header');
            const indicator = document.createElement('div');
            indicator.innerHTML = `
                <div style="
                    position: absolute;
                    top: 20px;
                    right: 40px;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    font-size: 14px;
                    color: rgba(255,255,255,0.8);
                ">
                    <span style="
                        width: 8px;
                        height: 8px;
                        background: #4ecdc4;
                        border-radius: 50%;
                        animation: pulse 2s infinite;
                    "></span>
                    实时数据更新中
                </div>
            `;
            header.style.position = 'relative';
            header.appendChild(indicator);
        }
    </script>
    
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</body>
</html>
